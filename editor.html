<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kdb+/q Editor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #1e1e1e;
    color: #d4d4d4;
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #editor-container {
    height: 75vh;
    overflow: hidden;
    border-bottom: 1px solid #333;
  }

  #editor-container .cm-editor {
    height: 100%;
  }

  #editor-container .cm-scroller {
    overflow: auto;
    height: 100%;
  }

  #toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 12px;
    background: #2d2d2d;
    border-bottom: 1px solid #444;
    font-size: 12px;
    color: #888;
    flex-shrink: 0;
    height: 28px;
  }

  #toolbar .keybinds {
    display: flex;
    gap: 16px;
  }

  #toolbar .keybinds span {
    color: #666;
  }

  #toolbar .keybinds kbd {
    background: #3a3a3a;
    border: 1px solid #555;
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 11px;
    color: #aaa;
    font-family: inherit;
  }

  #status {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #666;
    transition: background 0.3s;
  }

  #status-dot.connected { background: #4ec9b0; }
  #status-dot.disconnected { background: #f44747; }
  #status-dot.connecting { background: #dcdcaa; }

  #console-container {
    flex: 1;
    overflow: auto;
    background: #1a1a1a;
    padding: 8px 12px;
    font-size: 13px;
    line-height: 1.1;
  }

  .console-line {
    white-space: pre;
  }

  .console-result { color: #9cdcfe; }
  .console-error { color: #f44747; }
  .console-info { color: #666; font-style: italic; }

  .cm-builtin-link { text-decoration: underline; text-underline-offset: 3px; }

  @keyframes shake {
    0%,100% { transform: translate(0,0); }
    20% { transform: translate(-3px,1px); }
    40% { transform: translate(3px,-1px); }
    60% { transform: translate(-2px,1px); }
    80% { transform: translate(2px,-1px); }
  }
  #app.shake { animation: shake 0.3s ease; }
</style>
</head>
<body>
<div id="app">
  <div id="editor-container"></div>
  <div id="toolbar">
    <div class="keybinds">
      <span><kbd>⇧↵</kbd> eval</span>
      <span><kbd>⌘E</kbd> sel</span>
      <span><kbd>⌘↵</kbd> celebrate</span>
    </div>
    <div id="status">
      <div id="status-dot" class="connecting"></div>
      <span id="status-text">connecting…</span>
    </div>
  </div>
  <div id="console-container"></div>
</div>

<script type="importmap">
{
  "imports": {
    "@codemirror/view": "https://esm.sh/@codemirror/view@6",
    "@codemirror/state": "https://esm.sh/@codemirror/state@6",
    "@codemirror/language": "https://esm.sh/@codemirror/language@6",
    "@codemirror/commands": "https://esm.sh/@codemirror/commands@6",
"@lezer/highlight": "https://esm.sh/@lezer/highlight@1"
  }
}
</script>

<script type="module">
import { EditorView, keymap, lineNumbers, Decoration } from "@codemirror/view";
import { EditorState, StateEffect, StateField } from "@codemirror/state";
import { StreamLanguage, HighlightStyle, syntaxHighlighting } from "@codemirror/language";
import { defaultKeymap, history, historyKeymap } from "@codemirror/commands";
import { tags, Tag } from "@lezer/highlight";

// ─── q StreamLanguage ───────────────────────────────────────────────────────

const qKeywords = new Set(["if","while","do"]);

const qBuiltins = new Set([
  "abs","acos","and","asin","atan","avg","avgs","by","ceiling","cols","cor","cos",
  "count","cov","cross","cut","delete","deltas","desc","dev","differ","distinct","div",
  "dsave","each","ej","enlist","eval","except","exec","exit","exp","fby","fills","first","flip",
  "floor","from","get","getenv","group","gtime","hclose","hcount","hdel","hopen",
  "hsym","iasc","idesc","in","insert","inter","inv","key","keys","last","lj","ljf",
  "load","log","lower","lsq","ltime","ltrim","mavg","max","maxs","mcount",
  "md5","mdev","med","meta","min","mins","mmax","mmin","mmu","mod","msum",
  "neg","next","not","null","or","over","parse","peach","pj","prev","prior","rand","rank",
  "ratios","raze","read0","read1","reciprocal","reverse","rload","rotate",
  "rsave","rtrim","save","scan","select","set","setenv","show","signum","sin","sqrt","ss",
  "ssr","string","sublist","sum","sums","sv","system","tables","tan","til","trim",
  "type","uj","ujf","ungroup","union","update","upper","upsert","value","var","view",
  "views","vs","wavg","where","within","wj","wj1","wsum","xasc","xbar",
  "xcol","xcols","xdesc","xexp","xgroup","xkey","xlog","xprev","xrank"
]);

const bracketTags = [Tag.define(), Tag.define(), Tag.define()];
const builtinTag = Tag.define();
const localTag = Tag.define();

const qLanguage = StreamLanguage.define({
  name: "q",
  startState() {
    return { lineHasContent: false, bracketDepth: 0, afterOpenBrace: false, inParamList: false, lambdaStack: [] };
  },
  token(stream, state) {
    // Comments: line starting with / or \ , or / after whitespace
    if (stream.sol()) {
      state.lineHasContent = false;
      if (stream.peek() === "/" || stream.peek() === "\\") {
        stream.skipToEnd();
        return "comment";
      }
    }

    // Skip whitespace
    if (stream.eatSpace()) return null;

    const ch = stream.peek();
    state.lineHasContent = true;

    // Inline comment: / preceded by space (lineHasContent check avoids misclassifying division)
    if (ch === "/" && state.lineHasContent) {
      // check if it's followed by space or end of line → comment
      stream.next();
      if (stream.eol() || stream.peek() === " ") {
        stream.skipToEnd();
        return "comment";
      }
      // otherwise it's an operator (division/adverb)
      return "operator";
    }

    // Strings
    if (ch === '"') {
      stream.next();
      while (!stream.eol()) {
        const c = stream.next();
        if (c === "\\") stream.next(); // escape
        else if (c === '"') break;
      }
      state.afterOpenBrace = false;
      return "string";
    }

    // Symbols: backtick
    if (ch === "`") {
      stream.next();
      stream.eatWhile(/[\w.]/);
      state.afterOpenBrace = false;
      return "atom";
    }

    // Numbers (with optional type suffixes)
    if (/[0-9]/.test(ch) || (ch === "-" && /[0-9]/.test(stream.string[stream.pos + 1]))) {
      stream.match(/^-?[0-9][0-9a-fA-Fx.]*([eE][+-]?[0-9]+)?[hijefpnuvtdzmcbNIFE]?/);
      state.afterOpenBrace = false;
      return "number";
    }

    // Hex literal 0x...
    if (ch === "0" && stream.string[stream.pos + 1] === "x") {
      stream.match(/^0x[0-9a-fA-F]*/);
      state.afterOpenBrace = false;
      return "number";
    }

    // Identifiers, keywords, builtins, definitions
    if (/[a-zA-Z_.]/.test(ch)) {
      stream.eatWhile(/[\w.]/);
      const word = stream.current();

      // Check for definition (followed by : or ::)
      if (stream.match(/^::?/, false)) {
        // It's an assignment target
        return "def";
      }

      if (qKeywords.has(word)) {
        state.afterOpenBrace = false;
        return "keyword";
      }
      if (qBuiltins.has(word)) {
        state.afterOpenBrace = false;
        return "qbuiltin";
      }
      state.afterOpenBrace = false;
      if (state.inParamList && state.lambdaStack.length)
        state.lambdaStack[state.lambdaStack.length - 1].params.add(word);
      const isLocal = state.inParamList || state.lambdaStack.some(e => e.params.has(word));
      return isLocal ? "qlocal" : "variableName";
    }

    // Operators
    if (/[:@.?!$+\-*%=<>|&~^]/.test(ch)) {
      stream.next();
      // handle :: and :
      if (ch === ":" && stream.peek() === ":") stream.next();
      state.afterOpenBrace = false;
      return "operator";
    }

    // Brackets
    if (/[{}[\]()]/.test(ch)) {
      const isClose = /[})\]]/.test(ch);
      if (isClose && state.bracketDepth > 0) state.bracketDepth--;
      const level = state.bracketDepth % 3;
      stream.next();
      if (!isClose) state.bracketDepth++;
      if (ch === '{') { state.afterOpenBrace = true; state.lambdaStack.push({ depth: state.bracketDepth, params: new Set() }); }
      else if (ch === '}') { state.afterOpenBrace = false; if (state.lambdaStack.length && state.lambdaStack[state.lambdaStack.length-1].depth === state.bracketDepth + 1) state.lambdaStack.pop(); }
      else if (ch === '[' && state.afterOpenBrace) { state.inParamList = true; state.afterOpenBrace = false; }
      else if (ch === ']' && state.inParamList) state.inParamList = false;
      else state.afterOpenBrace = false;
      return "bracket" + level;
    }

    // Semicolons, commas
    stream.next();
    return null;
  },
  copyState(state) {
    return { ...state, lambdaStack: state.lambdaStack.map(e => ({ depth: e.depth, params: new Set(e.params) })) };
  },
  languageData: {
    commentTokens: { line: "/" }
  },
  tokenTable: {
    bracket0: bracketTags[0],
    bracket1: bracketTags[1],
    bracket2: bracketTags[2],
    qbuiltin: builtinTag,
    qlocal: localTag,
  }
});

// ─── VS Code Dark+ theme ─────────────────────────────────────────────────────

const vscodeDark = EditorView.theme({
  "&":                          { background: "#1e1e1e", color: "#d4d4d4" },
  ".cm-content":                { caretColor: "#aeafad" },
  ".cm-cursor, .cm-dropCursor": { borderLeftColor: "#aeafad" },
  "&.cm-focused .cm-selectionBackground, .cm-selectionBackground": { background: "#264f78" },
  ".cm-gutters":                { background: "#1e1e1e", color: "#858585", border: "none" },
  ".cm-lineNumbers .cm-gutterElement": { lineHeight: "1.1" },
  ".cm-activeLine":             { background: "#ffffff0d" },
  ".cm-line":                   { lineHeight: "1.1" },
  ".cm-activeLineGutter":       { background: "transparent", color: "#c6c6c6" },
}, { dark: true });

// ─── Highlight style ────────────────────────────────────────────────────────

const qHighlight = HighlightStyle.define([
  { tag: tags.keyword,              color: "#c586c0" },
  { tag: builtinTag, color: "#569cd6" },
  { tag: [tags.variableName, tags.definition(tags.variableName)], color: "#9cdcfe" },
  { tag: localTag, color: "#79b8ff" },
  { tag: tags.atom,    color: "#4ec9b0" },
  { tag: tags.number,  color: "#b5cea8" },
  { tag: tags.string,  color: "#ce9178" },
  { tag: tags.comment, color: "#6a9955", fontStyle: "italic" },
  { tag: bracketTags[0], color: "#ffd700" },
  { tag: bracketTags[1], color: "#da70d6" },
  { tag: bracketTags[2], color: "#179fff" },
]);

// ─── WebSocket ──────────────────────────────────────────────────────────────

const consoleEl = document.getElementById("console-container");
const statusDot = document.getElementById("status-dot");
const statusText = document.getElementById("status-text");

function addConsoleLine(text, cls) {
  const div = document.createElement("div");
  div.className = "console-line " + cls;
  div.textContent = text;
  consoleEl.appendChild(div);
  consoleEl.scrollTop = 0;
}

function setStatus(state, text) {
  statusDot.className = ""; // reset
  statusDot.classList.add(state);
  statusText.textContent = text;
}

let ws = null;

function connect() {
  setStatus("connecting", "connecting…");
  ws = new WebSocket("ws://" + location.host);

  ws.onopen = () => {
    setStatus("connected", "connected");
    addConsoleLine("Connected to q process.", "console-info");
  };

  ws.onmessage = (e) => {
    consoleEl.innerHTML = "";
    addConsoleLine(e.data, "console-result");
  };

  ws.onerror = () => {
    setStatus("disconnected", "error");
  };

  ws.onclose = () => {
    setStatus("disconnected", "disconnected — reload to reconnect");
    addConsoleLine("WebSocket closed.", "console-info");
    ws = null;
  };
}

function sendExpr(expr) {
  expr = expr.trim();
  if (!expr) return;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(expr);
  } else {
    addConsoleLine("Not connected.", "console-error");
  }
}

// ─── Fun effects ────────────────────────────────────────────────────────────

function shakeScreen() {
  const el = document.getElementById('app');
  el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
}

function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999';
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const originY = document.getElementById('toolbar').getBoundingClientRect().top;
  const colors = ['#ffd700','#da70d6','#179fff','#4ec9b0','#c586c0','#ce9178','#b5cea8'];
  const pieces = Array.from({length: 100}, () => ({
    x: Math.random()*canvas.width, y: originY,
    w: Math.random()*10+5, h: Math.random()*6+3,
    color: colors[Math.floor(Math.random()*colors.length)],
    vx: (Math.random()-0.5)*8, vy: -(Math.random()*12+4),
    g: 0.35, rot: Math.random()*Math.PI*2, vrot: (Math.random()-0.5)*0.25,
  }));
  let frame, done = false;
  (function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of pieces) {
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
      if (p.y > canvas.height + 20) continue;
      alive = true;
      ctx.save(); ctx.globalAlpha = Math.max(0, 1 - p.y/canvas.height*1.2);
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    if (alive && !done) frame = requestAnimationFrame(draw); else canvas.remove();
  })();
  setTimeout(() => { done = true; cancelAnimationFrame(frame); canvas.remove(); }, 4000);
}

function triggerEffect(fx) {
  if (fx === 'celebrate') { shakeScreen(); launchConfetti(); }
}

// ─── Keybindings ────────────────────────────────────────────────────────────

function evalLine(view) {
  const state = view.state;
  const cursor = state.selection.main.head;
  const line = state.doc.lineAt(cursor);
  sendExpr(line.text);
  return true;
}

function evalSelection(view) {
  const { from, to } = view.state.selection.main;
  if (from === to) return false;
  const expr = view.state.sliceDoc(from, to);
  sendExpr(expr);
  return true;
}

const qKeymap = [
  { key: "Shift-Enter", run: evalLine },
  { key: "Mod-e",       run: evalSelection },
  { key: "Mod-Enter",   run: view => { const line = view.state.doc.lineAt(view.state.selection.main.head); triggerEffect('celebrate'); sendExpr(line.text); return true; } },
];

// ─── Shift+click → open kx docs ─────────────────────────────────────────────

function wordAtPos(state, pos) {
  const line = state.doc.lineAt(pos);
  const offset = pos - line.from, text = line.text;
  let start = offset, end = offset;
  while (start > 0 && /[\w.]/.test(text[start - 1])) start--;
  while (end < text.length && /[\w.]/.test(text[end])) end++;
  const word = text.slice(start, end);
  return word ? { word, from: line.from + start, to: line.from + end } : null;
}

const setHoverLink = StateEffect.define();
const hoverLinkField = StateField.define({
  create() { return Decoration.none; },
  update(decos, tr) {
    for (const e of tr.effects) if (e.is(setHoverLink)) return e.value;
    return decos.map(tr.changes);
  },
  provide: f => EditorView.decorations.from(f)
});
const linkMark = Decoration.mark({ class: "cm-builtin-link" });

let shiftHeld = false, lastMousePos = null;

const shiftClickDocs = EditorView.domEventHandlers({
  mousemove(e) { lastMousePos = { x: e.clientX, y: e.clientY }; updateHoverLink(lastMousePos); },
  mouseleave() { lastMousePos = null; updateHoverLink(null); },
  mousedown(e) { if (e.shiftKey) e.preventDefault(); return false; },
  click(e, view) {
    if (!e.shiftKey) return false;
    const pos = view.posAtCoords({ x: e.clientX, y: e.clientY });
    const hit = pos != null && wordAtPos(view.state, pos);
    if (hit && qBuiltins.has(hit.word)) { window.open("https://code.kx.com/q/ref/" + hit.word + "/", "_blank").focus(); return true; }
    return false;
  }
});

// ─── Editor ─────────────────────────────────────────────────────────────────

const LS_KEY = "q-editor-content";

const startDoc = localStorage.getItem(LS_KEY) ?? `/ kdb+/q editor
/ Shift+Enter  eval line
/ Cmd+E        eval selection
/ Cmd+Enter    eval + celebrate

1 + 1
`;

const view = new EditorView({
  state: EditorState.create({
    doc: startDoc,
    extensions: [
      history(),
      lineNumbers(),
      keymap.of([...qKeymap, ...historyKeymap, ...defaultKeymap]),
      vscodeDark,
      qLanguage,
      syntaxHighlighting(qHighlight),
      hoverLinkField,
      shiftClickDocs,
      EditorView.updateListener.of(update => {
        if (update.docChanged) {
          localStorage.setItem(LS_KEY, update.state.doc.toString());
        }
      }),
    ],
  }),
  parent: document.getElementById("editor-container"),
});

function updateHoverLink(coords) {
  const pos = coords && shiftHeld ? view.posAtCoords(coords, false) : null;
  const hit = pos != null && wordAtPos(view.state, pos);
  const decos = hit && qBuiltins.has(hit.word) ? Decoration.set([linkMark.range(hit.from, hit.to)]) : Decoration.none;
  view.dispatch({ effects: setHoverLink.of(decos) });
  view.contentDOM.style.cursor = decos === Decoration.none ? "" : "pointer";
}

window.addEventListener("keydown", e => { if (e.key === "Shift" && !shiftHeld) { shiftHeld = true; updateHoverLink(lastMousePos); } });
window.addEventListener("keyup", e => { if (e.key === "Shift") { shiftHeld = false; updateHoverLink(null); } });

consoleEl.addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "a") {
    e.preventDefault();
    const range = document.createRange();
    range.selectNodeContents(consoleEl);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
});
consoleEl.setAttribute("tabindex", "0");

view.focus();
connect();
</script>
</body>
</html>
